# Fortführungsprognose nach IDW S 6 (Befunde des Steuerberaters)
prognose:
  auftrag: "Erstellung 12-Monats-Liquiditätsplan zum Stichtag 18.05.2026 im Auftrag der Geschäftsführung; Beurteilung des Vorliegens eines Insolvenzantragsgrundes nach §§ 17, 19 InsO und Hinweis nach § 102 StaRUG."
  basis: "Einzelfertigung Edelholz; 20 MA; Jahresumsatz 2025: 2.087 TEUR; Maschinenpark teilmodernisiert; Hausbanken: Berliner Sparkasse (Geschäftskonto), Mittelbrandenburgische Sparkasse (KK 150 TEUR, 92 % ausgenutzt, ab 01.01.2027 Reduzierung auf 80 TEUR angekündigt)."
  krise: "Stadium: Liquiditätskrise (Hauschka-Schema, IDW S 6 Tz. 5 ff.). Ursachen: Energiepreisanstieg 2022/23; Bugwelle Lieferantenkredit (64 TEUR überfällig); ausgeschöpfte KK-Linie; SV-Rückstand 65 TEUR; CNC-Antrieb defekt (28 TEUR Reparatur). Indizien § 17 InsO erfüllt: Lastschriftrückgabe 27.03.2026, SV-Rückstände TK (2. Mahnung, Strafanzeige § 266a StGB angedroht), AOK Vollstreckung angekündigt."
  leitbild: "Fortführung des Geschäftsmodells Edeltischlerei mit Fokus Hotellerie/Boutique; Reduktion Privatkundengeschäft (Margenproblem); Aufbau wiederkehrender Wartungsverträge bei Bestandshotels."
  massnahmen: "Kurzfristig: Stundung SV-Beiträge mit Ratenplan, Verzicht Gesellschafterdarlehenstilgung Korbach (qualifizierter Rangrücktritt § 39 Abs. 2 InsO), Forderungsverkauf (Factoring) Senatsverwaltung. Mittelfristig: Aufstockung KK-Linie scheitert (Bank kürzt!); Sale-and-Lease-Back CNC-Maschine prüfen; Einlage Gesellschafter 80 TEUR notwendig. Langfristig: Margenanpassung Privatkundengeschäft, Restrukturierungsverfahren StaRUG nur bei nur drohender Zahlungsunfähigkeit (§ 18 InsO) eröffnet – hier ZU bereits eingetreten."
  planung: "Integrierte Planung 24 Monate liegt nicht vor. Skill zeigt: ab KW 22 (25.–31.05.2026) tritt Zahlungsunfähigkeit ein (Liquiditätslücke > 10 %, nicht binnen 3 Wochen schließbar). Erst KW 31 (Zahlung Lützowufer) bringt operative Entlastung – dann aber 9 Wochen Zahlungsunfähigkeit überschritten."
  sanierung: "Sanierungsfähigkeit IDW S 6: NEGATIV ohne Frischkapital + qualifizierten Rangrücktritt + Forderungsfactoring. Keine überwiegende Wahrscheinlichkeit branchenüblicher Ertragskraft binnen 24 Monaten."
  fortbestehen: "Fortbestehensprognose § 19 Abs. 2 InsO: NEGATIV. In Verbindung mit rechnerischer Unterdeckung (negatives bilanzielles EK 31.12.2025: −34 TEUR; im Überschuldungsstatus mit stillen Reserven CNC ca. +60 TEUR positiv, ABER ohne Rangrücktritt Korbach 70 TEUR → Unterdeckung verbleibt) → INSOLVENZRECHTLICHE ÜBERSCHULDUNG INDIZIERT (§ 19 InsO). Antragspflicht 6 Wochen ab Eintritt (§ 15a Abs. 1 Satz 2 InsO). Hinweis § 102 StaRUG zwingend."
