name: sozialrecht-elektrorollstuhl-koerner-oldenburg
description: Hilfsmittelstreit um Elektrorollstuhl nach Paragraf 33 SGB V mit MD-Ablehnung, privatem Reha-Gutachten, Klageentwurf, Kassenverteidigung und Urteilsvarianten.
checks:
  - Klagefrist aus dem Widerspruchsbescheid korrekt erkennen.
  - Anspruch aus Paragraf 33 SGB V sauber vom bloßen Komfortinteresse abgrenzen.
  - Gehstock, Rollator, manuellen Rollstuhl und Elektrorollstuhl funktional vergleichen.
  - Wirtschaftlichkeit nicht mit billigster Versorgung verwechseln.
  - MD-Aktenlage gegen persönliche Untersuchung und Reha-Gutachten beweiswürdigend einordnen.
  - Klageentwurf, Kassenverteidigung und gerichtliche Entscheidungsweichen getrennt ausgeben.
