name: "Nachehelicher Unterhalt Voßkamp - Herabsetzung und Befristung 1578b BGB"
plugin: "fachanwalt-familienrecht"

expected_use:
  - Statthaften Rechtsbehelf gegen einen Unterhaltsvergleich erkennen (Abänderung nach § 239 FamFG statt § 238 FamFG bei Beschluss)
  - Herabsetzung und Befristung nach § 1578b BGB unterscheiden und am Maßstab fortwirkender ehebedingter Nachteile prüfen
  - Ehebedingte Nachteile (Teilzeit, Wohnortwechsel, ausgeschlagene Beförderung) konkret herausarbeiten und von freien Entscheidungen abgrenzen
  - Aufstockungsobliegenheit und fiktives Einkommen der Berechtigten nur insoweit ansetzen, als die Teilzeit nicht ehebedingt fortwirkt
  - Neue verfestigte Lebensgemeinschaft tatsächlich aufklären und für § 1578b BGB sowie hilfsweise § 1579 Nr. 2 BGB würdigen
  - Tabellen-, Selbstbehalts- und Einkommenswerte als Arbeitswerte behandeln und vor Verwendung verifizieren

checks:
  - id: r01-readme-vorhanden
    check_type: file_exists
    description: "README.md vorhanden"
    path: "README.md"

  - id: r02-gesamt-pdf-vorhanden
    check_type: file_exists
    description: "Gesamt-PDF gebaut"
    path: "gesamt-pdf/nachehelicher-unterhalt-befristung-1578b-muenster_gesamt.pdf"

  - id: r03-mindestens-zehn-aktenstuecke
    check_type: file_count
    description: "mindestens zehn Markdown-Aktenstücke"
    glob: "*.md"
    min: 10

  - id: r04-1578b-im-befristungsbegehren
    check_type: text_contains
    description: "Befristungsbegehren stützt sich auf § 1578b BGB"
    path: "08_abaenderung_und_befristungsbegehren.md"
    contains: "1578b"

  - id: r05-239-famfg-statt-238
    check_type: text_contains
    description: "Abänderung eines Vergleichs über § 239 FamFG erkannt"
    path: "08_abaenderung_und_befristungsbegehren.md"
    contains: "239 FamFG"

  - id: r06-verwirkung-hilfsweise
    check_type: text_contains
    description: "Verwirkung nach § 1579 BGB hilfsweise geprüft"
    path: "12_strategie_und_vergleichskorridor.md"
    contains: "1579"

  - id: r07-fachspezifische-wuerdigung
    check_type: human_review
    description: "Ehebedingte Nachteile und Befristung sind fachlich tragfähig zu würdigen"
    note: "Fortwirkende ehebedingte Nachteile gegen freie Entscheidungen abgrenzen; Befristungszeitpunkt begründen"
