name: Release Plugin ZIPs

# Baut bei jedem Tag oder bei manueller Ausloesung pro Plugin eine ZIP-Datei
# und haengt sie an den GitHub Release. Damit ergeben sich stabile Download-URLs:
#   https://github.com/Klotzkette/claude-fuer-deutsches-recht/releases/latest/download/<plugin>.zip
# Direkt einzeln in kompatiblen Plugin-Oberflaechen installierbar.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release-Tag (z. B. v1.1.0). Leer = nur ZIPs bauen, keinen Release anlegen.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validator
        run: node scripts/validate-plugin-structure.mjs

      - name: Gesamt-PDFs der Testakten validieren
        run: python3 scripts/validate-testakten-gesamt-pdf.py

      - name: Werkstatt- und Schnellstart-Prompts erzeugen
        run: |
          # Werkstatt- und Schnellstart-Prompts sind reine Markdown-Begleitdateien,
          # die NICHT als Skills in die Plugin-Logik gehören.
          # Das frueher hier aufgerufene sync-schnellstart-skill.py wurde absichtlich
          # entfernt, weil es pro Plugin einen skills/<plugin>-schnellstart/SKILL.md
          # erzeugt hat. Diese Wrapper-Skills würden beim Marketplace-Install als
          # zusätzlicher Skill geladen, obwohl sie nur Einstiegsdateien enthalten.
          # Die Werkstatt- und Schnellstart-Prompts werden als Markdown-Assets
          # im Release veröffentlicht.
          python3 scripts/generate-werkstatt-und-schnellstart-prompts.py
          python3 scripts/inject-streitstoff-beitrag-gerichtsplugins.py
          python3 scripts/inject-megaprompt-section.py
          python3 scripts/inject-plugin-sofort-download-section.py
          python3 scripts/inject-direkt-loslegen-section.py
          python3 scripts/generate-skills-overview.py
          python3 scripts/generate-werkstatt-und-schnellstart-coverage.py

      - name: Skill-Indizes neu erzeugen (SKILLS.md + skills-index, Stand = marketplace-Version)
        run: python3 scripts/generate-skills-md.py

      - name: Release-Asset-Index neu erzeugen
        run: python3 scripts/generate-asset-index.py

      - name: Python-Abhaengigkeiten fuer den PDF-Bau installieren
        run: python3 -m pip install --quiet reportlab pypdf python-docx openpyxl odfpy

      - name: Pluginlokale Gesamt-PDFs der Testakten bauen
        run: python3 scripts/build-plugin-testakte-gesamt-pdfs.py

      - name: Liste aller Plugins aus marketplace.json lesen
        id: plugins
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, pathlib
          m = json.loads(pathlib.Path('.claude-plugin/marketplace.json').read_text())
          plugins = [
              {"name": p["name"], "source": p.get("source") or f"./{p['name']}"}
              for p in m["plugins"]
          ]
          names = [p["name"] for p in plugins]
          print('names=' + ' '.join(names))
          print('plugins_json=' + json.dumps(plugins, ensure_ascii=False, separators=(',', ':')))
          PY

      - name: ZIPs bauen
        env:
          PLUGINS_JSON: ${{ steps.plugins.outputs.plugins_json }}
        run: |
          rm -rf dist
          mkdir -p dist
          python3 - <<'PY' > dist/plugin-map.tsv
          import json
          import os

          for plugin in json.loads(os.environ["PLUGINS_JSON"]):
              print(f"{plugin['name']}\t{plugin['source']}")
          PY
          while IFS=$'\t' read -r plugin source; do
            source="${source#./}"
            if [ ! -d "$source" ]; then
              echo "Plugin-Quelle fehlt: $plugin -> $source" >&2
              exit 1
            fi
            echo "Baue $plugin.zip"
            (cd "$source" && zip -rq "${GITHUB_WORKSPACE}/dist/${plugin}.zip" . -x '*.DS_Store' '__pycache__/*' '*.pyc' 'CLAUDE.md')
            ls -la "dist/${plugin}.zip"
          done < dist/plugin-map.tsv
          # Manifest fuer Marketplace-Komfort
          cp .claude-plugin/marketplace.json dist/marketplace.json

      - name: Release-ZIPs validieren
        run: python3 scripts/validate-release-zips.py dist .claude-plugin/marketplace.json

      - name: Werkstatt- und Schnellstart-Markdownassets bauen
        run: |
          python3 scripts/build-werkstatt-schnellstart-sammelzips.py dist
          test -s dist/alle-werkstatt-prompts.zip
          test -s dist/alle-schnellstart-prompts.zip
          ls -lh dist/alle-werkstatt-prompts.zip dist/alle-schnellstart-prompts.zip

      - name: Beispielakten separat verpacken (kein Teil der Plugins, testakte-Prefix)
        run: |
          # Beispielakten werden mit testakte-Prefix gepackt, damit sie sich im
          # Namespace klar von Plugin-ZIPs unterscheiden und niemals versehentlich
          # über 'Install from .zip' als Plugin geladen werden können.
          python3 scripts/build-testakten-release-zips.py dist
          ls -la dist/testakte-*.zip | head

      - name: Testakten-Release-ZIPs validieren
        run: python3 scripts/validate-testakten-release-zips.py dist

      - name: Einzel-PDF-ZIPs der Testakten bauen (jede Unterlage als eigene PDF)
        run: |
          # Pro Testakte ein ZIP, in dem jede Unterlage als separate PDF vorliegt
          # (im Gegensatz zum Gesamt-PDF, das alle Stücke in ein Dokument fasst).
          mkdir -p dist/testakten-einzelpdfs
          python3 scripts/build-testakten-einzelpdf-zips.py dist/testakten-einzelpdfs
          cp dist/testakten-einzelpdfs/alle-testakten-einzelpdfs.zip dist/alle-testakten-einzelpdfs.zip
          cp dist/testakten-einzelpdfs/testakte-*-einzelpdfs.zip dist/
          ls -la dist/testakten-einzelpdfs/testakte-*-einzelpdfs.zip | head
          ls -lh dist/alle-testakten-einzelpdfs.zip

      - name: Einzel-PDF-ZIPs validieren
        run: python3 scripts/validate-testakten-einzelpdf-zips.py dist/testakten-einzelpdfs

      - name: Skill-Markdown-Bundles bauen (echte Downloads pro Plugin)
        run: |
          # Pro Plugin ein ZIP mit allen SKILL.md + Schnellstart-Prompt + Plugin-README.
          # Die Einzel-ZIPs wandern ins Komplettpaket; als Release-Asset wird nur
          # das Sammel-ZIP hochgeladen, damit die Asset-Zahl unter der GitHub-
          # Grenze bleibt.
          mkdir -p dist/skills-markdown
          python3 scripts/build-skills-markdown-bundles.py dist/skills-markdown
          cp dist/skills-markdown/alle-skills-markdown.zip dist/alle-skills-markdown.zip
          ls dist/skills-markdown/*-skills-markdown.zip | wc -l
          ls -lh dist/alle-skills-markdown.zip

      - name: Pluginlokale Testakten-Bundles bauen
        run: |
          # Einige Plugins, insbesondere Gerichtsplugins, haben ihre
          # Demonstrationsakte direkt unter <plugin>/testakte. Diese Akten
          # bekommen eigene Release-Assets fuer echte Direkt-Downloads.
          python3 scripts/build-plugin-testakte-bundles.py dist
          python3 scripts/build-plugin-testakte-einzelpdf-zips.py dist
          python3 scripts/validate-plugin-testakte-assets.py dist
          ls dist/*-testakte.zip | wc -l
          ls -lh dist/alle-pluginlokalen-testakten.zip

      - name: Sammel-ZIPs bauen
        run: |
          # alle-plugins-megazip.zip enthaelt die installierbaren Einzel-ZIPs
          # plus marketplace.json, nicht die Rohordner.
          mkdir -p dist/mega-plugins
          cp dist/marketplace.json dist/mega-plugins/marketplace.json
          for plugin in ${{ steps.plugins.outputs.names }}; do
            cp "dist/${plugin}.zip" "dist/mega-plugins/${plugin}.zip"
          done
          (cd dist/mega-plugins && zip -rq "../alle-plugins-megazip.zip" . -x '*.DS_Store')
          rm -rf dist/mega-plugins

          # alle-testakten.zip wurde im vorherigen Schritt mit demselben
          # Arbeitsakten-Filter gebaut wie die Einzel-Testakten-ZIPs.
          test -s dist/alle-testakten.zip

          # alles-komplettpaket.zip enthaelt die Einzel-ZIPs, Sammel-ZIPs,
          # Marketplace und zentrale Uebersichten. Ein Download fuer alles,
          # ohne die installierbaren Plugin-ZIPs mit Rohordnern zu vermischen.
          mkdir -p dist/komplettpaket/plugins dist/komplettpaket/testakten dist/komplettpaket/uebersichten dist/komplettpaket/skills-markdown
          cp dist/marketplace.json dist/komplettpaket/marketplace.json
          cp dist/alle-plugins-megazip.zip dist/komplettpaket/alle-plugins-megazip.zip
          cp dist/alle-testakten.zip dist/komplettpaket/alle-testakten.zip
          cp dist/alle-testakten-einzelpdfs.zip dist/komplettpaket/alle-testakten-einzelpdfs.zip
          cp dist/alle-skills-markdown.zip dist/komplettpaket/alle-skills-markdown.zip
          cp dist/alle-pluginlokalen-testakten.zip dist/komplettpaket/alle-pluginlokalen-testakten.zip
          cp dist/alle-pluginlokalen-testakten-einzelpdfs.zip dist/komplettpaket/alle-pluginlokalen-testakten-einzelpdfs.zip
          cp dist/alle-werkstatt-prompts.zip dist/komplettpaket/alle-werkstatt-prompts.zip
          cp dist/alle-schnellstart-prompts.zip dist/komplettpaket/alle-schnellstart-prompts.zip
          for plugin in ${{ steps.plugins.outputs.names }}; do
            cp "dist/${plugin}.zip" "dist/komplettpaket/plugins/${plugin}.zip"
          done
          for z in dist/skills-markdown/*-skills-markdown.zip; do
            [ -e "$z" ] || continue
            # alle-skills-markdown.zip nicht doppelt mitnehmen
            base="$(basename "$z")"
            if [ "$base" = "alle-skills-markdown.zip" ]; then continue; fi
            cp "$z" "dist/komplettpaket/skills-markdown/$base"
          done
          if [ -d testakten ]; then
            for z in dist/testakte-*.zip; do
              [ -e "$z" ] || continue
              cp "$z" "dist/komplettpaket/testakten/$(basename "$z")"
            done
            for z in dist/testakten-einzelpdfs/testakte-*-einzelpdfs.zip; do
              [ -e "$z" ] || continue
              cp "$z" "dist/komplettpaket/testakten/$(basename "$z")"
            done
          fi
          for z in dist/*-testakte.zip; do
            [ -e "$z" ] || continue
            base="$(basename "$z")"
            case "$base" in
              testakte-*) continue ;;
              alle-*) continue ;;
            esac
            cp "$z" "dist/komplettpaket/testakten/$base"
          done
          for z in dist/*-testakte-einzelpdfs.zip; do
            [ -e "$z" ] || continue
            base="$(basename "$z")"
            case "$base" in
              testakte-*) continue ;;
              alle-*) continue ;;
            esac
            cp "$z" "dist/komplettpaket/testakten/$base"
          done
          cp README.md SKILLS.md ASSET_INDEX.md CHANGELOG.md dist/komplettpaket/uebersichten/
          # skills-index/ enthaelt die pro-Plugin-Detailseiten, auf die SKILLS.md
          # mit relativen Links zeigt. Ohne diesen Ordner waeren die Links im
          # ZIP-Download ins Leere gerichtet.
          if [ -d skills-index ]; then
            cp -R skills-index dist/komplettpaket/uebersichten/skills-index
          fi
          (cd dist/komplettpaket && zip -rq "../alles-komplettpaket.zip" . -x '*.DS_Store')
          rm -rf dist/komplettpaket

          test -s dist/alle-plugins-megazip.zip
          test -s dist/alle-testakten.zip
          test -s dist/alle-testakten-einzelpdfs.zip
          test -s dist/alle-skills-markdown.zip
          test -s dist/alle-pluginlokalen-testakten.zip
          test -s dist/alle-pluginlokalen-testakten-einzelpdfs.zip
          test -s dist/alle-werkstatt-prompts.zip
          test -s dist/alle-schnellstart-prompts.zip
          test -s dist/alles-komplettpaket.zip
          ls -lh dist/alle-plugins-megazip.zip dist/alle-testakten.zip dist/alle-testakten-einzelpdfs.zip dist/alle-skills-markdown.zip dist/alle-pluginlokalen-testakten.zip dist/alle-werkstatt-prompts.zip dist/alle-schnellstart-prompts.zip dist/alles-komplettpaket.zip

      - name: Checksums erzeugen
        run: |
          python3 - <<'PY'
          import hashlib
          from pathlib import Path
          dist = Path("dist")
          assets = sorted(
              p for p in dist.iterdir()
              if p.is_file() and (p.suffix in {".zip", ".md"} or p.name == "marketplace.json")
          )
          with (dist / "checksums-sha256.txt").open("w", encoding="utf-8") as fh:
              for path in assets:
                  fh.write(f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}\n")
          PY
          test -s dist/checksums-sha256.txt

      - name: Tag bestimmen
        id: tagref
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Release veroeffentlichen (gedrosselter ZIP-Upload)
        if: steps.tagref.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tagref.outputs.tag }}
        run: |
          set -euo pipefail
          gh_retry() {
            local attempt
            for attempt in 1 2 3 4 5 6; do
              if "$@"; then
                return 0
              fi
              echo "GitHub API-Aufruf fehlgeschlagen (Versuch $attempt): $*" >&2
              sleep $((attempt * 60))
            done
            echo "GitHub API-Aufruf endgueltig fehlgeschlagen: $*" >&2
            return 1
          }

          release_exists=0
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG existiert bereits; fehlende/aktualisierte Assets werden ueberschrieben."
            release_exists=1
          else
            gh_retry gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          fi

          # GitHub kann bei sehr vielen Release-Assets ein Secondary Rate Limit
          # ausloesen. Deshalb laden wir bewusst einzeln und mit kleinen Pausen.
          upload_asset() {
            local asset="$1"
            local asset_name
            asset_name="$(basename "$asset")"
            local attempt
            for attempt in 1 2 3 4; do
              # "gh release upload --clobber" kann bei sehr vielen Assets
              # gelegentlich erfolgreich zurueckkehren, ohne das entfernte
              # Asset tatsaechlich sichtbar zu ersetzen. Bei bestehenden
              # Releases loeschen wir deshalb vorhandene Assets explizit.
              # Bei frisch erzeugten Releases sparen wir den Delete-Call, damit
              # der Actions-Installation-Token nicht unnoetig Rate-Limit frisst.
              if [ "$release_exists" = "1" ]; then
                gh release delete-asset "$RELEASE_TAG" "$asset_name" -y >/dev/null 2>&1 || true
                sleep 1
              fi
              if timeout 180s gh release upload "$RELEASE_TAG" "$asset" --clobber; then
                return 0
              fi
              echo "Upload fehlgeschlagen (Versuch $attempt): $asset_name"
              sleep $((attempt * 20))
            done
            echo "Upload endgueltig fehlgeschlagen: $asset_name" >&2
            return 1
          }

          count=0
          while IFS= read -r asset; do
            echo "Lade $(basename "$asset") hoch"
            upload_asset "$asset"
            count=$((count + 1))
            if [ $((count % 20)) -eq 0 ]; then
              sleep 20
            else
              sleep 2
            fi
          done < <(find dist -maxdepth 1 -type f \( -name '*.zip' -o -name 'marketplace.json' -o -name 'checksums-sha256.txt' \) | sort)

      - name: Release-Assets remote verifizieren
        if: steps.tagref.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/validate-release-assets.py dist "${{ steps.tagref.outputs.tag }}" --repo "${{ github.repository }}" --timeout-seconds 900 --poll-seconds 10

      - name: Artefakte hochladen (immer)
        uses: actions/upload-artifact@v7
        with:
          name: plugin-zips
          path: |
            dist/*.zip
            dist/*.md
            dist/**/*.zip
            dist/marketplace.json
            dist/checksums-sha256.txt
          retention-days: 30
